name: ANIVA CI/CD

on:
  push:
    branches: [main, production]
  pull_request:
    branches: [main]

jobs:
  # ── CI: ビルドチェック ──
  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Prisma generate
        working-directory: web
        run: npx prisma generate

      - name: TypeScript check
        working-directory: web
        run: npx tsc --noEmit --skipLibCheck 2>&1 | tail -20 || true

      - name: Build (staging)
        working-directory: web
        env:
          SKIP_ENV_VALIDATION: '1'
          DATABASE_URL: 'postgresql://dummy:dummy@localhost:5432/dummy'
          NEXTAUTH_SECRET: 'ci-secret-for-build'
          NEXTAUTH_URL: 'http://localhost:3000'
          NEXT_PUBLIC_POSTHOG_KEY: 'phc_dummy'
          NEXT_PUBLIC_SENTRY_DSN: ''
          SENTRY_ORG: ''
          SENTRY_PROJECT: ''
        run: pnpm build

  # ── Deploy Staging: mainブランチpush時 ──
  deploy-staging:
    name: Deploy to Staging
    needs: build-check
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy to staging via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            cd /home/openclaw/.openclaw/workspace/projects/aniva/web
            git fetch origin main
            git checkout main
            git pull origin main
            rm -rf .next
            npx prisma generate
            pnpm build
            pm2 restart aniva-staging
            echo "Staging deploy complete: $(git rev-parse --short HEAD)"

  # ── Deploy Production: productionブランチpush時（承認制）──
  deploy-production:
    name: Deploy to Production
    needs: build-check
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/production' && github.event_name == 'push'
    environment:
      name: production
      url: https://aniva-project.com
    steps:
      - name: Deploy to production via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            cd /home/openclaw/.openclaw/workspace/projects/aniva/web
            git fetch origin production
            git checkout production
            git pull origin production
            rm -rf .next
            npx prisma generate
            pnpm build
            pm2 restart aniva
            curl -f http://localhost:3050 > /dev/null && echo "Production health check OK" || echo "WARN: Health check failed"
            echo "Production deploy complete: $(git rev-parse --short HEAD)"
